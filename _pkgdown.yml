url: https://phytoecia.github.io/eCOMET/
template:
  bootstrap: 5
  params:
    bootswatch: lumen
    logo: man/figures/ecomet_logo.png

navbar:
  structure:
    left:
      - home
      - reference
      - tutorials
      - contributing
      - news
    right:
      - github
      - search
  components:
    github:
      icon: fab fa-github
      href: https://github.com/Phytoecia/eCOMET
    tutorials:
      text: Tutorials
      href: articles/index.html
    contributing:
      text: Contributing
      href: articles/contributing.html


reference:
  - title: "Core dataset processing"
    desc: "Build and populate the mmo object from MZmine outputs and annotation tools."
    contents:
      - GetMZmineFeature
      - AddSiriusAnnot
      - AddChemDist
      - AddCustomDist
      - AddCustomAnnot
      - ReplaceZero
      - MassNormalization
      - LogNormalization
      - MeancenterNormalization
      - ZNormalization
      - ReorderGroups
      - SwitchGroup
      - FeaturePresence

  - title: "Filtering"
    desc: "Subset the mmo object by samples, groups, or features, and keep associated MGF spectral files in sync."
    contents:
      - filter_mmo
      - filter_mgf_to_mmo
      - annotate_feature_info_ms2_from_mgf
      - filter_canopus_annotations
      - filter_cosmic_structure

  - title: "Differential analysis & visualization"
    desc: "Identify and visualize differentially accumulated metabolites between groups."
    contents:
      - PairwiseComp
      - GetDAMs
      - GetLog2FoldChange
      - GetGroupMeans
      - VolcanoPlot
      - AnovaBarPlot
      - GenerateHeatmapInputs

  - title: "Ordination & clustering"
    desc: "Multivariate methods for comparing samples and groups."
    contents:
      - PCAplot
      - PLSDAplot
      - NMDSplot
      - PCoAplot
      - HCplot

  - title: "Chemical diversity"
    desc: "Alpha and beta diversity metrics incorporating feature abundance and chemical distances."
    contents:
      - GetAlphaDiversity
      - GetBetaDiversity
      - GetRichness
      - GetHillNumbers
      - GetFunctionalHillNumber
      - GetFaithPD
      - RarefactionAUC
      - CalculateGroupBetaDistance
      - GetSpecializationIndex

  - title: "Chemical class analysis"
    desc: "Enrichment and visualization of compound classes using SIRIUS/CANOPUS annotations."
    contents:
      - CanopusLevelEnrichmentAnal
      - CanopusListEnrichmentPlot
      - CanopusListEnrichmentPlot_2
      - CanopusLevelEnrichmentPlot
      - CanopusAllLevelEnrichmentPlot
      - PlotNPCStackedBar
      - MSEA

  - title: "Compound networks & dendrograms"
    desc: "Build chemical similarity trees and export to iTOL or Cytoscape."
    contents:
      - FeatureDendrogram
      - PlotFeatureDendrogram
      - ExportITOL
      - ExportCytoscape

  - title: "Phenotype association"
    desc: "Correlate individual features or metabolite sets with continuous ecological variables."
    contents:
      - FeaturePhenotypeCorrelation
      - ScreenFeaturePhenotypeCorrelation
      - GetPerformanceFeatureCorrelation
      - GetPerformanceFeatureLMM
      - GetPerformanceFeatureRegression
      - PlotFoldchangeResistanceQuad
      - PlotFoldchangeResistanceRegression
      - PlotFoldchangeResistanceRegression_t

  - title: "Save & export"
    desc: "Save mmo objects and export results."
    contents:
      - SaveMMO
      - LoadMMO
      - ExportFeaturesToCSV
      - pool_mmo_by_group

  - title: "Utilities"
    desc: "Helper functions for data access, formatting, and internal calculations."
    contents:
      - GetDistanceMat
      - GetNormFeature
      - FeatureToID
      - IDToFeature
      - print.mmo
      - anova_tukey_dunnett
      - write_anova
      - permanova_stat

articles:
  - title: "Tutorials"
    contents:
      - eCOMET-intro
      - Tutorial_1_Treatment-based_study
      - Tutorial_2_Interspecific_Comparisons
      - Tutorial_3_Dendrogram_and_Molecular_Networks
  - title: "Contributing"
    contents:
      - contributing

news:
  one_page: true

social:
  github: phytoecia
